<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级特权兑换券 · 64张横纹竖排版 (文字防挤压修复)</title>
    <style>
        /* 全局与高级色彩变量 */
        :root {
            --primary-color: #111b2e; 
            --gold-color: #c5a059;    
            --bg-color: #f4f1eb;      
            
            --bronze-grad: linear-gradient(135deg, #8c7362, #b89f89, #8c7362);
            --silver-grad: linear-gradient(135deg, #8e949b, #cdd1d6, #8e949b);
            --gold-grad: linear-gradient(135deg, #b8860b, #e8c371, #b8860b);
            --diamond-grad: linear-gradient(135deg, #0f172a, #1e293b, #0f172a);
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #d0d0d0;
            margin: 0;
            padding: 20px;
            display: block; 
            text-align: center;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        /* 严格控制 A4 页面容器尺寸 */
        .a4-page {
            background-color: var(--bg-color);
            width: 210mm;
            height: 297mm;
            padding: 10mm; 
            margin: 0 auto 20px auto; 
            box-sizing: border-box;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden; 
            text-align: left;
        }

        /* 兑换券网格：无缝贴合 */
        .ticket-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(4, 1fr);
            gap: 0; 
            flex-grow: 1;
            height: 100%;
        }

        .ticket {
            background: #ffffff;
            display: flex;
            position: relative;
            overflow: hidden;
            border: 1px solid #dcdcdc;
            box-sizing: border-box;
        }

        /* 边框折叠 */
        .ticket:nth-child(odd) { border-right: none; }
        .ticket:nth-child(-n+6) { border-bottom: none; }

        /* 高级双线内边框 */
        .ticket::before {
            content: '';
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid rgba(197, 160, 89, 0.3);
            pointer-events: none;
            z-index: 2;
        }

        /* 古典音乐底纹水印 */
        .watermark {
            position: absolute;
            font-size: 100px;
            color: rgba(197, 160, 89, 0.05);
            font-family: serif;
            right: 50px;
            top: 50%;
            transform: translateY(-50%) rotate(-15deg);
            pointer-events: none;
            user-select: none;
        }

        /* 左侧主券区 */
        .ticket-main {
            flex: 1;
            padding: 12px 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            z-index: 1;
            box-sizing: border-box;
        }

        /* 右侧副券区 */
        .ticket-stub {
            width: 65px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0; 
            color: #ffffff;
            border-left: 2px dashed rgba(255,255,255,0.8);
            position: relative;
            z-index: 1;
            box-sizing: border-box;
            --bc-color: #ffffff; 
        }

        /* 模拟撕页打孔 */
        .ticket-stub::before, .ticket-stub::after {
            content: '';
            position: absolute;
            left: -6px;
            width: 10px;
            height: 10px;
            background-color: var(--bg-color);
            border-radius: 50%;
            border: 1px solid #dcdcdc;
        }
        .ticket-stub::before { top: -5px; border-bottom-color: transparent; border-left-color: transparent; transform: rotate(45deg); }
        .ticket-stub::after { bottom: -5px; border-top-color: transparent; border-left-color: transparent; transform: rotate(-45deg); }

        /* 左侧内容排版 */
        .t-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .t-tier {
            display: inline-block; 
            font-size: 10px;
            padding: 2px 8px;
            color: #fff;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .t-coins {
            font-size: 14px;
            font-weight: bold;
            font-family: 'Georgia', serif;
            color: var(--gold-color);
        }
        .t-title {
            font-size: 17px;
            color: var(--primary-color);
            margin: 0 0 4px 0;
            font-family: 'Georgia', serif;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .t-desc {
            font-size: 10px;
            color: #555;
            line-height: 1.4;
            margin: 0;
            flex-grow: 1;
            padding-right: 50px; 
        }
        
        /* 官方认证印章 */
        .official-seal {
            position: absolute;
            right: 15px;
            bottom: 42px; 
            width: 50px;  
            height: 50px;
            border: 1.5px solid rgba(197, 160, 89, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: rgba(197, 160, 89, 0.8);
            text-align: center;
            transform: rotate(-15deg);
            font-weight: bold;
            letter-spacing: 1px;
            line-height: 1.2;
        }
        .official-seal::after {
            content: 'YMSQ';
            position: absolute;
            font-size: 12px;
            color: rgba(197, 160, 89, 0.25);
        }

        .t-footer {
            margin-top: 6px;
            border-top: 1px solid #eee;
            padding-top: 6px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 9px; 
            color: #888;
        }
        .t-sign {
            border-bottom: 1px solid #888;
            width: 45px;
            display: inline-block;
        }

        .micro-text {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            font-size: 4px;
            color: rgba(0,0,0,0.2);
            white-space: nowrap;
            overflow: hidden;
            letter-spacing: 1px;
            font-family: monospace;
        }

        /* 核心修复：副券文字防挤压换行 */
        .stub-text {
            writing-mode: vertical-rl;
            text-orientation: upright; /* 强制中文正立，防止奇怪的旋转 */
            white-space: nowrap;       /* 绝对禁止换行/换列 */
            flex-shrink: 0;            /* 防止被 Flexbox 压缩高度 */
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            margin: 8px 0; 
        }
        
        .stub-no {
            writing-mode: vertical-rl;
            text-orientation: mixed;   /* 英文和数字顺时针旋转90度 */
            white-space: nowrap;       /* 绝对禁止换行/换列 */
            flex-shrink: 0;            /* 防止被 Flexbox 压缩高度 */
            font-size: 9px;            /* 稍微缩小一点字号 */
            font-family: 'Courier New', Courier, monospace;
            color: rgba(255,255,255,0.9);
            letter-spacing: 0.5px;     /* 缩小字间距 */
            margin-bottom: 2px;        /* 底部留出安全边距 */
        }

        /* 短横线，从上往下垂直排列 */
        .barcode {
            width: 14px;  
            height: 65px; /* 进一步缩减条形码高度，给底部编号留出更多空间 */
            opacity: 0.85;
            display: flex;
            flex-direction: column; 
            align-items: stretch;
            overflow: hidden; 
            flex-shrink: 0; /* 防止条形码被压缩 */
        }

        /* 阶梯主题应用 */
        .theme-bronze .ticket-stub { background: var(--bronze-grad); }
        .theme-bronze .t-tier { background: var(--bronze-grad); }
        .theme-silver .ticket-stub { background: var(--silver-grad); }
        .theme-silver .t-tier { background: var(--silver-grad); }
        .theme-gold .ticket-stub { background: var(--gold-grad); }
        .theme-gold .t-tier { background: var(--gold-grad); }
        .theme-diamond { background: var(--diamond-grad); color: #fff; border-color: var(--gold-color); }
        .theme-diamond .t-title, .theme-diamond .t-desc, .theme-diamond .t-footer { color: #e2e8f0; }
        .theme-diamond .ticket-stub { 
            background: var(--gold-grad); 
            color: var(--primary-color); 
            --bc-color: var(--primary-color); 
        }
        .theme-diamond .t-tier { background: var(--gold-grad); color: var(--primary-color); }
        .theme-diamond .stub-no { color: var(--primary-color); font-weight: bold; }
        .theme-diamond .ticket::before { border: 1px solid rgba(197, 160, 89, 0.5); }
        .theme-diamond .micro-text { color: rgba(255,255,255,0.1); }
        .theme-diamond .official-seal { border-color: var(--gold-color); color: var(--gold-color); }
        .theme-diamond .official-seal::after { color: rgba(197, 160, 89, 0.3); }

        /* ── 传奇券：全页证书样式 ── */
        .cert-page {
            background: linear-gradient(160deg, #0a0f1e 0%, #0f172a 40%, #1a0a00 100%);
            width: 210mm;
            height: 297mm;
            padding: 0;
            margin: 0 auto 20px auto;
            box-sizing: border-box;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
        }
        .cert-border-outer {
            position: absolute;
            top: 8mm; left: 8mm; right: 8mm; bottom: 8mm;
            border: 2px solid rgba(197,160,89,0.6);
            pointer-events: none;
        }
        .cert-border-inner {
            position: absolute;
            top: 11mm; left: 11mm; right: 11mm; bottom: 11mm;
            border: 1px solid rgba(197,160,89,0.3);
            pointer-events: none;
        }
        .cert-corner {
            position: absolute;
            width: 18mm; height: 18mm;
            border-color: #c5a059;
            border-style: solid;
            opacity: 0.8;
        }
        .cert-corner.tl { top: 14mm; left: 14mm; border-width: 2px 0 0 2px; }
        .cert-corner.tr { top: 14mm; right: 14mm; border-width: 2px 2px 0 0; }
        .cert-corner.bl { bottom: 14mm; left: 14mm; border-width: 0 0 2px 2px; }
        .cert-corner.br { bottom: 14mm; right: 14mm; border-width: 0 2px 2px 0; }
        .cert-watermark {
            position: absolute;
            font-size: 180px;
            color: rgba(197,160,89,0.04);
            font-family: serif;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%) rotate(-20deg);
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
        }
        .cert-body {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 0 20mm;
            width: 100%;
            box-sizing: border-box;
        }
        .cert-badge {
            font-size: 48px;
            margin-bottom: 6mm;
            display: block;
            filter: drop-shadow(0 0 12px rgba(197,160,89,0.5));
        }
        .cert-label {
            font-size: 10px;
            letter-spacing: 4px;
            color: #c5a059;
            text-transform: uppercase;
            margin-bottom: 3mm;
        }
        .cert-school {
            font-size: 13px;
            color: #94a3b8;
            letter-spacing: 2px;
            margin-bottom: 8mm;
        }
        .cert-divider {
            width: 60mm;
            height: 1px;
            background: linear-gradient(90deg, transparent, #c5a059, transparent);
            margin: 0 auto 8mm auto;
        }
        .cert-title {
            font-size: 32px;
            font-family: 'Georgia', serif;
            font-weight: bold;
            color: #e8c371;
            letter-spacing: 3px;
            margin-bottom: 3mm;
            text-shadow: 0 0 20px rgba(197,160,89,0.4);
        }
        .cert-subtitle {
            font-size: 13px;
            color: #c5a059;
            letter-spacing: 2px;
            margin-bottom: 10mm;
        }
        .cert-divider2 {
            width: 40mm;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(197,160,89,0.5), transparent);
            margin: 0 auto 10mm auto;
        }
        .cert-desc {
            font-size: 12px;
            color: #94a3b8;
            line-height: 2;
            max-width: 130mm;
            margin: 0 auto 10mm auto;
            text-align: justify;
        }
        .cert-desc strong { color: #e2e8f0; }
        .cert-highlight {
            display: inline-block;
            border: 1px solid rgba(197,160,89,0.5);
            padding: 3mm 8mm;
            font-size: 11px;
            color: #c5a059;
            letter-spacing: 2px;
            margin-bottom: 12mm;
        }
        .cert-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
            padding: 0 20mm;
            box-sizing: border-box;
            position: absolute;
            bottom: 20mm;
        }
        .cert-seal {
            width: 22mm; height: 22mm;
            border: 1.5px solid rgba(197,160,89,0.6);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 8px; color: rgba(197,160,89,0.8);
            text-align: center; line-height: 1.3;
            font-weight: bold; letter-spacing: 1px;
            transform: rotate(-15deg);
        }
        .cert-sign-block { text-align: center; }
        .cert-sign-line { width: 30mm; height: 1px; background: rgba(197,160,89,0.4); margin-bottom: 2mm; }
        .cert-sign-label { font-size: 9px; color: #64748b; letter-spacing: 1px; }
        .cert-no {
            position: absolute;
            bottom: 14mm; right: 20mm;
            font-size: 9px; color: rgba(197,160,89,0.4);
            font-family: monospace; letter-spacing: 1px;
        }
        .cert-stars {
            position: absolute;
            font-size: 9px;
            color: rgba(197,160,89,0.2);
            letter-spacing: 3px;
        }
        .cert-stars.top { top: 20mm; left: 50%; transform: translateX(-50%); }
        .cert-stars.bot { bottom: 20mm; left: 50%; transform: translateX(-50%); }

        /* Safari 专属终极打印优化 */
        @page { size: A4 portrait; margin: 0; }
        @media print {
            html, body { width: 100%; margin: 0 !important; padding: 0 !important; background: none; display: block !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .t-tier, .stub-text { text-shadow: none !important; }
            .a4-page, .cert-page { width: 210mm; height: 297mm; margin: 0 !important; padding: 8mm !important; box-shadow: none !important; border: none !important; page-break-after: always !important; break-after: page !important; page-break-inside: avoid !important; break-inside: avoid !important; }
            .cert-page { padding: 0 !important; }
            .a4-page:last-child, .cert-page:last-child { page-break-after: auto !important; break-after: auto !important; }
            .ticket { page-break-inside: avoid !important; break-inside: avoid !important; }
        }
    </style>
</head>
<body>

<script>
    const ticketData = [
        { tier: "BRONZE / 青铜", coins: "80 音符币", title: "专属琴房冠名权", desc: "凭此券可获得三天专属琴房使用权，彰显专属排面（每个月仅限一次）！", theme: "theme-bronze", mark: "𝄞", prefix: "B-801", stubText: "凭券核销" },
        { tier: "SILVER / 白银", coins: "100 音符币", title: "施坦威体验日", desc: "凭此券可在老师空闲无课时段，独享一天教师教室施坦威三角钢琴练习特权（每周仅限一次）。", theme: "theme-silver", mark: "𝄢", prefix: "S-100B", stubText: "凭券核销" },
        { tier: "SILVER / 白银", coins: "120 音符币", title: "旁听神仙课", desc: "凭此券特批进入教室，旁听任何一节其他老师的课程（需提前1天预约）。", theme: "theme-silver", mark: "𝄢", prefix: "S-100A", stubText: "凭券核销" },
        { tier: "SILVER / 白银", coins: "150 音符币", title: "作业豁免券", desc: "凭此券可合法免除一次常规作业。具体科目需提前与任课老师协商（每个月仅限一次）。", theme: "theme-silver", mark: "𝄢", prefix: "S-150A", stubText: "凭券核销" },
        { tier: "GOLD / 黄金", coins: "180 音符币", title: "课表 DIY 日", desc: "凭此券获得一天“选课自由”，自主决定是否出席当天的非专业课和非考试类课程（每个月仅限一次）。", theme: "theme-gold", mark: "𝄡", prefix: "G-180A", stubText: "凭券核销" },
        { tier: "GOLD / 黄金", coins: "200 音符币", title: "期末加分特权", desc: "坚持练琴的最强回报！凭此券可在期末专业课考试成绩基础上额外 +0.5 分，直接计入最终成绩（每人仅可兑换一次，兑换后不可退回）。", theme: "theme-gold", mark: "𝄡", prefix: "G-200A", stubText: "凭券核销" },
        { tier: "DIAMOND / 钻石", coins: "260 音符币", title: "大师级专属 MV", desc: "由老师动用专业设备，为你精修录制并剪辑一首专属演奏视频（每学期仅限一次）。永久留存！", theme: "theme-diamond", mark: "𝅗𝅥", prefix: "D-260A", stubText: "终极特权" },
        { tier: "DIAMOND / 钻石", coins: "300 音符币", title: "额外专业课", desc: "超级大奖！凭此券可和自己的专业老师多上一节专业课，享受名师加餐指导（每个月仅限一次）。", theme: "theme-diamond", mark: "𝅗𝅥", prefix: "D-300B", stubText: "终极特权" },
        { fullPage: true, coins: "400 音符币", title: "「梅纽因之星」荣耀专题", prefix: "LEGEND-400" }
    ];

    // 核心算法：生成横向条纹，从上往下堆叠
    function generateUniqueBarcode(globalIndex) {
        let html = '';
        let seed = globalIndex * 104729; 
        let rand = () => {
            seed = (seed * 279470273) % 4294967291;
            return seed / 4294967291;
        };

        let totalStripes = 60; 
        for(let j = 0; j < totalStripes; j++) {
            let randomVal = rand();
            let h = randomVal > 0.85 ? 3 : (randomVal > 0.4 ? 2 : 1);
            
            if(j % 2 === 0) {
                html += `<i style="height:${h}px; width:100%; background-color: var(--bc-color); display:block; flex-shrink:0;"></i>`;
            } else {
                html += `<i style="height:${h}px; width:100%; display:block; flex-shrink:0;"></i>`;
            }
        }
        return html;
    }

    let globalCounter = 1;

    // 循环生成每张 A4 纸
    ticketData.forEach(t => {
        if (t.fullPage) {
            // 传奇券：全页证书，仅生成 1 张
            document.write(`
                <div class="cert-page">
                    <div class="cert-border-outer"></div>
                    <div class="cert-border-inner"></div>
                    <div class="cert-corner tl"></div>
                    <div class="cert-corner tr"></div>
                    <div class="cert-corner bl"></div>
                    <div class="cert-corner br"></div>
                    <div class="cert-watermark">✦</div>
                    <div class="cert-stars top">✦ &nbsp; ✦ &nbsp; ✦ &nbsp; ✦ &nbsp; ✦</div>
                    <div class="cert-body">
                        <span class="cert-badge">🌟</span>
                        <div class="cert-label">YMSQ LEGEND AWARD</div>
                        <div class="cert-school">青岛耶胡迪梅纽因学校 · 教务部荣誉出品</div>
                        <div class="cert-divider"></div>
                        <div class="cert-title">${t.title}</div>
                        <div class="cert-subtitle">荣耀专题兑换证书</div>
                        <div class="cert-divider2"></div>
                        <p class="cert-desc">
                            凭此证书，持有人将以<strong>优秀学生代表</strong>身份，由学校教务部专程安排专业团队，为其录制<strong>独家官方专题报道</strong>。<br>内容将记录持有人的练琴故事、成长历程与艺术追求，作为学校典范档案<strong>永久珍藏</strong>并在校内展示宣传。
                        </p>
                        <div class="cert-highlight">✦ &nbsp; 全校仅此一张 · 一学期唯一名额 · 先兑换先得 &nbsp; ✦</div>
                        <div style="font-size:11px; color:#c5a059; letter-spacing:1px;">${t.coins}</div>
                    </div>
                    <div class="cert-footer">
                        <div class="cert-seal">VALID<br>YMSQ<br>认证</div>
                        <div class="cert-sign-block">
                            <div class="cert-sign-line"></div>
                            <div class="cert-sign-label">授权人签字</div>
                        </div>
                        <div class="cert-sign-block">
                            <div class="cert-sign-line"></div>
                            <div class="cert-sign-label">持有人签字</div>
                        </div>
                    </div>
                    <div class="cert-no">No. ${t.prefix} &nbsp;|&nbsp; 核销后作废</div>
                    <div class="cert-stars bot">✦ &nbsp; ✦ &nbsp; ✦ &nbsp; ✦ &nbsp; ✦</div>
                </div>
            `);
        } else {
            // 普通券：8张网格
            document.write('<div class="a4-page"><div class="ticket-grid">');
            for(let i = 1; i <= 8; i++) {
                document.write(`
                    <div class="ticket ${t.theme}">
                        <div class="watermark">${t.mark}</div>
                        <div class="ticket-main">
                            <div class="t-header">
                                <span class="t-tier">${t.tier}</span>
                                <span class="t-coins">${t.coins}</span>
                            </div>
                            <h2 class="t-title">${t.title}</h2>
                            <p class="t-desc">${t.desc}</p>
                            <div class="official-seal">VALID<br>YMSQ</div>
                            <div class="t-footer">
                                <span>授权人: 青岛耶胡迪梅纽因学校教务部</span>
                                <span>核销签字: <span class="t-sign"></span></span>
                            </div>
                            <div class="micro-text">YMSQ-AUTHORIZED-TICKET-YMSQ-AUTHORIZED-TICKET-YMSQ-AUTHORIZED-TICKET-YMSQ-AUTHORIZED</div>
                        </div>
                        <div class="ticket-stub">
                            <div class="barcode">${generateUniqueBarcode(globalCounter)}</div>
                            <div class="stub-text">${t.stubText}</div>
                            <div class="stub-no">No. ${t.prefix}-0${i}</div>
                        </div>
                    </div>
                `);
                globalCounter++;
            }
            document.write('</div></div>');
        }
    });
</script>
