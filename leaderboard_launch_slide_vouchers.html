<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>特权兑换券 · 高级展示（与实物样式一致）</title>
  <style>
    /* ========== 以下与 兑换券.html 保持一致（券面样式） ========== */
    :root {
      --primary-color: #111b2e;
      --gold-color: #c5a059;
      --bg-color: #f4f1eb;
      --bronze-grad: linear-gradient(135deg, #8c7362, #b89f89, #8c7362);
      --silver-grad: linear-gradient(135deg, #8e949b, #cdd1d6, #8e949b);
      --gold-grad: linear-gradient(135deg, #b8860b, #e8c371, #b8860b);
      --diamond-grad: linear-gradient(135deg, #0f172a, #1e293b, #0f172a);
    }

    .ticket {
      background: #ffffff;
      display: flex;
      position: relative;
      overflow: hidden;
      border: 1px solid #dcdcdc;
      box-sizing: border-box;
    }
    .ticket::before {
      content: '';
      position: absolute;
      top: 4px; left: 4px; right: 4px; bottom: 4px;
      border: 1px solid rgba(197, 160, 89, 0.3);
      pointer-events: none;
      z-index: 2;
    }
    .watermark {
      position: absolute;
      font-size: 100px;
      color: rgba(197, 160, 89, 0.05);
      font-family: serif;
      right: 50px;
      top: 50%;
      transform: translateY(-50%) rotate(-15deg);
      pointer-events: none;
      user-select: none;
    }
    .ticket-main {
      flex: 1;
      padding: 12px 15px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      z-index: 1;
      box-sizing: border-box;
    }
    .ticket-stub {
      width: 65px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 15px 0;
      color: #ffffff;
      border-left: 2px dashed rgba(255,255,255,0.8);
      position: relative;
      z-index: 1;
      box-sizing: border-box;
      --bc-color: #ffffff;
    }
    .ticket-stub::before, .ticket-stub::after {
      content: '';
      position: absolute;
      left: -6px;
      width: 10px;
      height: 10px;
      background-color: var(--bg-color);
      border-radius: 50%;
      border: 1px solid #dcdcdc;
    }
    .ticket-stub::before { top: -5px; border-bottom-color: transparent; border-left-color: transparent; transform: rotate(45deg); }
    .ticket-stub::after { bottom: -5px; border-top-color: transparent; border-left-color: transparent; transform: rotate(-45deg); }
    .t-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .t-tier {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      color: #fff;
      font-weight: bold;
      letter-spacing: 1px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
    .t-coins {
      font-size: 14px;
      font-weight: bold;
      font-family: 'Georgia', serif;
      color: var(--gold-color);
    }
    .t-title {
      font-size: 17px;
      color: var(--primary-color);
      margin: 0 0 4px 0;
      font-family: 'Georgia', serif;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .t-desc {
      font-size: 10px;
      color: #555;
      line-height: 1.4;
      margin: 0;
      flex-grow: 1;
      padding-right: 50px;
    }
    .official-seal {
      position: absolute;
      right: 15px;
      bottom: 42px;
      width: 50px;
      height: 50px;
      border: 1.5px solid rgba(197, 160, 89, 0.6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      color: rgba(197, 160, 89, 0.8);
      text-align: center;
      transform: rotate(-15deg);
      font-weight: bold;
      letter-spacing: 1px;
      line-height: 1.2;
    }
    .official-seal::after {
      content: 'YMSQ';
      position: absolute;
      font-size: 12px;
      color: rgba(197, 160, 89, 0.25);
    }
    .t-footer {
      margin-top: 6px;
      border-top: 1px solid #eee;
      padding-top: 6px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      font-size: 9px;
      color: #888;
    }
    .t-sign {
      border-bottom: 1px solid #888;
      width: 45px;
      display: inline-block;
    }
    .micro-text {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      font-size: 4px;
      color: rgba(0,0,0,0.2);
      white-space: nowrap;
      overflow: hidden;
      letter-spacing: 1px;
      font-family: monospace;
    }
    .stub-text {
      writing-mode: vertical-rl;
      text-orientation: upright;
      white-space: nowrap;
      flex-shrink: 0;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 3px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
      margin: 8px 0;
    }
    .stub-no {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      white-space: nowrap;
      flex-shrink: 0;
      font-size: 9px;
      font-family: 'Courier New', Courier, monospace;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .barcode {
      width: 14px;
      height: 65px;
      opacity: 0.85;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      overflow: hidden;
      flex-shrink: 0;
    }
    .theme-bronze .ticket-stub { background: var(--bronze-grad); }
    .theme-bronze .t-tier { background: var(--bronze-grad); }
    .theme-silver .ticket-stub { background: var(--silver-grad); }
    .theme-silver .t-tier { background: var(--silver-grad); }
    .theme-gold .ticket-stub { background: var(--gold-grad); }
    .theme-gold .t-tier { background: var(--gold-grad); }
    .theme-diamond { background: var(--diamond-grad); color: #fff; border-color: var(--gold-color); }
    .theme-diamond .t-title, .theme-diamond .t-footer { color: #e2e8f0; }
    .theme-diamond .ticket-stub {
      background: var(--gold-grad);
      color: var(--primary-color);
      --bc-color: var(--primary-color);
    }
    .theme-diamond .t-tier { background: var(--gold-grad); color: var(--primary-color); }
    .theme-diamond .stub-no { color: var(--primary-color); font-weight: bold; }
    .theme-diamond .ticket::before { border: 1px solid rgba(197, 160, 89, 0.5); }
    .theme-diamond .micro-text { color: rgba(255,255,255,0.1); }
    .theme-diamond .official-seal { border-color: var(--gold-color); color: var(--gold-color); }
    .theme-diamond .official-seal::after { color: rgba(197, 160, 89, 0.3); }

    .cert-page {
      background: linear-gradient(160deg, #0a0f1e 0%, #0f172a 40%, #1a0a00 100%);
      width: 210mm;
      height: 297mm;
      padding: 0;
      margin: 0;
      box-sizing: border-box;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #e2e8f0;
    }
    .cert-border-outer {
      position: absolute;
      top: 8mm; left: 8mm; right: 8mm; bottom: 8mm;
      border: 2px solid rgba(197,160,89,0.6);
      pointer-events: none;
    }
    .cert-border-inner {
      position: absolute;
      top: 11mm; left: 11mm; right: 11mm; bottom: 11mm;
      border: 1px solid rgba(197,160,89,0.3);
      pointer-events: none;
    }
    .cert-corner {
      position: absolute;
      width: 18mm; height: 18mm;
      border-color: #c5a059;
      border-style: solid;
      opacity: 0.8;
    }
    .cert-corner.tl { top: 14mm; left: 14mm; border-width: 2px 0 0 2px; }
    .cert-corner.tr { top: 14mm; right: 14mm; border-width: 2px 2px 0 0; }
    .cert-corner.bl { bottom: 14mm; left: 14mm; border-width: 0 0 2px 2px; }
    .cert-corner.br { bottom: 14mm; right: 14mm; border-width: 0 2px 2px 0; }
    .cert-watermark {
      position: absolute;
      font-size: 180px;
      color: rgba(197,160,89,0.04);
      font-family: serif;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%) rotate(-20deg);
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }
    .cert-body {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 20mm;
      width: 100%;
      box-sizing: border-box;
    }
    .cert-badge {
      font-size: 48px;
      margin-bottom: 6mm;
      display: block;
      filter: drop-shadow(0 0 12px rgba(197,160,89,0.5));
    }
    .cert-label {
      font-size: 10px;
      letter-spacing: 4px;
      color: #c5a059;
      text-transform: uppercase;
      margin-bottom: 3mm;
    }
    .cert-school {
      font-size: 13px;
      color: #94a3b8;
      letter-spacing: 2px;
      margin-bottom: 8mm;
    }
    .cert-divider {
      width: 60mm;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c5a059, transparent);
      margin: 0 auto 8mm auto;
    }
    .cert-title {
      font-size: 32px;
      font-family: 'Georgia', serif;
      font-weight: bold;
      color: #e8c371;
      letter-spacing: 3px;
      margin-bottom: 3mm;
      text-shadow: 0 0 20px rgba(197,160,89,0.4);
    }
    .cert-subtitle {
      font-size: 13px;
      color: #c5a059;
      letter-spacing: 2px;
      margin-bottom: 10mm;
    }
    .cert-divider2 {
      width: 40mm;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(197,160,89,0.5), transparent);
      margin: 0 auto 10mm auto;
    }
    .cert-page--visual .cert-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-bottom: 28mm;
    }
    .cert-visual-fill {
      font-size: 22px;
      letter-spacing: 0.5em;
      color: rgba(197, 160, 89, 0.35);
      margin-top: 6mm;
      user-select: none;
    }
    .cert-desc {
      font-size: 12px;
      color: #94a3b8;
      line-height: 2;
      max-width: 130mm;
      margin: 0 auto 10mm auto;
      text-align: justify;
    }
    .cert-desc strong { color: #e2e8f0; }
    .cert-highlight {
      display: inline-block;
      border: 1px solid rgba(197,160,89,0.5);
      padding: 3mm 8mm;
      font-size: 11px;
      color: #c5a059;
      letter-spacing: 2px;
      margin-bottom: 12mm;
    }
    .cert-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      width: 100%;
      padding: 0 20mm;
      box-sizing: border-box;
      position: absolute;
      bottom: 20mm;
    }
    .cert-seal {
      width: 22mm; height: 22mm;
      border: 1.5px solid rgba(197,160,89,0.6);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; color: rgba(197,160,89,0.8);
      text-align: center; line-height: 1.3;
      font-weight: bold; letter-spacing: 1px;
      transform: rotate(-15deg);
    }
    .cert-sign-block { text-align: center; }
    .cert-sign-line { width: 30mm; height: 1px; background: rgba(197,160,89,0.4); margin-bottom: 2mm; }
    .cert-sign-label { font-size: 9px; color: #64748b; letter-spacing: 1px; }
    .cert-no {
      position: absolute;
      bottom: 14mm; right: 20mm;
      font-size: 9px; color: rgba(197,160,89,0.4);
      font-family: monospace; letter-spacing: 1px;
    }
    .cert-stars {
      position: absolute;
      font-size: 9px;
      color: rgba(197,160,89,0.2);
      letter-spacing: 3px;
    }
    .cert-stars.top { top: 20mm; left: 50%; transform: translateX(-50%); }
    .cert-stars.bot { bottom: 20mm; left: 50%; transform: translateX(-50%); }

    /* ========== 展示页环境（高级展台） ========== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, rgba(99, 102, 241, 0.18), transparent 55%),
                  radial-gradient(ellipse 80% 50% at 100% 50%, rgba(197, 160, 89, 0.08), transparent 45%),
                  #0c0c0f;
      margin: 0;
      padding: 0 0 64px;
      -webkit-font-smoothing: antialiased;
    }
    .page-hero {
      text-align: center;
      padding: clamp(2rem, 5vmin, 3.5rem) 1.25rem 2rem;
      color: #f5f5f7;
    }
    .page-hero h1 {
      font-size: clamp(1.35rem, 4vmin, 2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    .page-hero h1 span {
      background: linear-gradient(90deg, #e8c371, #fcd34d, #c5a059);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .page-hero p {
      font-size: clamp(0.8rem, 2vmin, 0.95rem);
      color: rgba(245, 245, 247, 0.5);
      max-width: 36em;
      margin: 0 auto;
      line-height: 1.55;
    }
    .showcase {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 clamp(14px, 4vw, 28px);
    }
    .voucher-block {
      margin-bottom: clamp(2.5rem, 6vmin, 3.5rem);
    }
    .voucher-block .block-cap {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      padding: 0 4px;
    }
    .voucher-block-cap-center {
      justify-content: center;
    }
    .voucher-block .block-cap strong {
      font-size: 0.82rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.88);
      letter-spacing: 0.04em;
    }
    .voucher-block .block-cap span {
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.38);
      font-variant-numeric: tabular-nums;
    }
    .ticket-plate {
      border-radius: 20px;
      padding: clamp(18px, 4vmin, 28px);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
    }
    /* 单张展示：完整四边线 + 与印刷版同比例加宽 */
    .ticket.showcase-ticket {
      min-height: 198px;
      max-width: 520px;
      margin: 0 auto;
      border: 1px solid #dcdcdc !important;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
    }
    .cert-plate {
      border-radius: 20px;
      padding: clamp(16px, 3vmin, 24px);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      display: flex;
      justify-content: center;
    }
    .cert-scale-wrap {
      width: 100%;
      max-width: min(100%, 420px);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 420px;
    }
    .cert-scale-inner {
      transform: scale(0.52);
      transform-origin: top center;
      margin-bottom: calc(-297mm * 0.48);
    }
    @media (max-width: 480px) {
      .cert-scale-inner { transform: scale(0.42); margin-bottom: calc(-297mm * 0.58); }
      .cert-scale-wrap { min-height: 360px; }
    }

    /* 与演示稿一致：上券下说明、传奇页左右分栏 */
    .vch-wrap { width: 100%; }
    .vch-wrap--voucher .vch-voucher-split {
      display: flex;
      flex-direction: column;
      gap: clamp(14px, 3vmin, 22px);
      width: 100%;
    }
    .vch-wrap--voucher .vch-ticket-wrap {
      display: flex;
      justify-content: center;
      width: 100%;
    }
    .vch-wrap--voucher .vch-ticket-compact {
      width: 100%;
      max-width: min(72vw, 520px);
      margin: 0 auto;
    }
    .vch-wrap--voucher .ticket-main { justify-content: flex-start; }
    .vch-wrap--voucher .t-footer { margin-top: auto; }
    .vch-wrap--voucher .vch-coins-gap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      width: 100%;
      padding: 0.4rem 0 0.15rem;
    }
    .vch-wrap--voucher .vch-coins-label {
      font-size: clamp(0.68rem, 1.8vmin, 0.78rem);
      font-weight: 600;
      letter-spacing: 0.35em;
      color: rgba(245, 245, 247, 0.45);
    }
    .vch-wrap--voucher .vch-coins-value {
      font-size: clamp(1.05rem, 3vmin, 1.35rem);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.06em;
      color: rgba(253, 224, 71, 0.95);
      text-shadow: 0 0 20px rgba(197, 160, 89, 0.35);
    }
    .vch-wrap--voucher .vch-desc-panel {
      border-radius: 16px;
      padding: clamp(16px, 3vmin, 24px) clamp(18px, 3.5vw, 28px);
      background: linear-gradient(165deg, rgba(197, 160, 89, 0.12) 0%, rgba(15, 23, 42, 0.65) 100%);
      border: 2px solid rgba(197, 160, 89, 0.45);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06) inset, 0 16px 48px rgba(0, 0, 0, 0.45);
    }
    .vch-wrap--voucher .vch-desc-main {
      margin: 0;
      font-size: clamp(0.88rem, 2.2vmin, 1.1rem);
      font-weight: 700;
      line-height: 1.65;
      color: rgba(255, 248, 235, 0.96);
      letter-spacing: 0.03em;
    }
    .vch-wrap--legend .vch-legend-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.14fr) minmax(0, 0.9fr);
      gap: clamp(12px, 2.5vw, 24px);
      align-items: stretch;
      width: 100%;
    }
    @media (max-width: 720px) {
      .vch-wrap--legend .vch-legend-grid { grid-template-columns: 1fr; }
    }
    .vch-wrap--legend .vch-legend-cert-col {
      container-type: size;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      min-width: 0;
    }
    .vch-wrap--legend .vch-legend-text-col {
      display: flex;
      min-height: 0;
      min-width: 0;
    }
    .vch-wrap--legend .vch-cert-plate-legend {
      overflow: visible;
      max-width: 100%;
      width: 100%;
      padding: 0.2rem 0.35rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(255, 255, 255, 0.08);
      box-shadow: none;
      backdrop-filter: none;
    }
    .vch-wrap--legend .vch-cert-scale-box {
      position: relative;
      width: min(100cqw, calc(100cqh * 210 / 297));
      height: min(100cqh, calc(100cqw * 297 / 210));
      max-width: 100%;
      margin: 0 auto;
      overflow: hidden;
      box-sizing: border-box;
    }
    .vch-wrap--legend .vch-cert-scale-box .cert-page {
      position: absolute;
      left: 0;
      top: 0;
      width: 210mm;
      height: 297mm;
      transform: scale(min(100cqw / 210mm, 100cqh / 297mm));
      transform-origin: top left;
      box-shadow:
        0 22px 56px rgba(0, 0, 0, 0.65),
        0 0 120px rgba(197, 160, 89, 0.22),
        inset 0 0 0 1px rgba(197, 160, 89, 0.12);
    }
    .vch-wrap--legend .vch-legend-copy {
      border-radius: 16px;
      padding: clamp(16px, 3vmin, 28px);
      background: linear-gradient(160deg, rgba(197, 160, 89, 0.14) 0%, rgba(15, 23, 42, 0.72) 100%);
      border: 2px solid rgba(197, 160, 89, 0.5);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.07) inset, 0 20px 56px rgba(0, 0, 0, 0.5);
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: clamp(10px, 2vmin, 20px);
    }
    .vch-wrap--legend .vch-legend-lead {
      margin: 0;
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .vch-wrap--legend .vch-legend-lead-inner {
      display: block;
      text-align: center;
      max-width: 100%;
      font-size: clamp(0.92rem, 2.5vmin, 1.12rem);
      font-weight: 700;
      line-height: 1.85;
      color: rgba(255, 250, 240, 0.96);
      letter-spacing: 0.03em;
    }
    .vch-wrap--legend .vch-legend-lead strong { color: #f8e6b3; font-weight: 800; }
    .vch-wrap--legend .vch-legend-highlight {
      margin: 0;
      flex-shrink: 0;
      padding: clamp(0.65rem, 1.8vmin, 1rem) clamp(0.75rem, 2vmin, 1.1rem);
      font-size: clamp(0.82rem, 2.1vmin, 0.98rem);
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.08em;
      color: #e8c371;
      border: 1px solid rgba(197, 160, 89, 0.45);
      background: rgba(0, 0, 0, 0.2);
      line-height: 1.55;
    }
    .vch-wrap--legend .vch-legend-fine {
      margin: 0;
      flex-shrink: 0;
      font-size: clamp(0.8rem, 2vmin, 0.95rem);
      font-weight: 600;
      color: rgba(253, 224, 71, 0.9);
      text-align: center;
      line-height: 1.55;
      padding-top: 0.25rem;
    }
  </style>
</head>
<body>
  <header class="page-hero">
    <h1>星耀特权 · <span>兑换券全览</span></h1>
  </header>
  <main class="showcase" id="showcase-root"></main>

  <script>
    const ticketData = [
      { tier: "BRONZE / 青铜", coins: "100 音符币", title: "专属琴房特权", desc: "凭此券可获得三天专属琴房使用权，彰显专属排面（每个月仅限一次）！", theme: "theme-bronze", mark: "𝄞", prefix: "B-100A", stubText: "凭券核销", cap: "青铜 · 专属琴房特权" },
      { tier: "BRONZE / 青铜", coins: "120 音符币", title: "施坦威体验日", desc: "凭此券可在周六、周日独享一天施坦威教室练习特权（每周仅限一次，不可叠加兑换）。", theme: "theme-bronze", mark: "𝄞", prefix: "B-120A", stubText: "凭券核销", cap: "青铜 · 施坦威体验日" },
      { tier: "SILVER / 白银", coins: "150 音符币", title: "旁听神仙课", desc: "凭此券特批进入教室，旁听任何一节其他老师的课程（如音乐素养课、专业课、室内乐课等），需提前 1 天与老师预约。", theme: "theme-silver", mark: "𝄢", prefix: "S-150A", stubText: "凭券核销", cap: "白银 · 旁听神仙课" },
      { tier: "SILVER / 白银", coins: "150 音符币", title: "作业豁免券", desc: "凭此券可合法免除一次常规作业。具体科目需提前与任课老师协商（每个月仅限一次）。", theme: "theme-silver", mark: "𝄢", prefix: "S-150B", stubText: "凭券核销", cap: "白银 · 作业豁免券" },
      { tier: "GOLD / 黄金", coins: "200 音符币", title: "课表 DIY 日", desc: "凭此券获得一天“选课自由”，自主决定是否出席当天的非专业课和非考试类课程（每个月仅可以使用一次）。", theme: "theme-gold", mark: "𝄡", prefix: "G-200A", stubText: "凭券核销", cap: "黄金 · 课表 DIY 日" },
      { tier: "GOLD / 黄金", coins: "280 音符币", title: "期末加分特权", desc: "凭此券在期末专业课考试成绩基础上额外 +0.5 分，直接计入最终成绩。坚持练琴的你，让期末成绩再进一步！（每人仅可兑换一次，兑换后不可退回）", theme: "theme-gold", mark: "𝄡", prefix: "G-280A", stubText: "凭券核销", cap: "黄金 · 期末加分特权" },
      { tier: "DIAMOND / 钻石", coins: "300 音符币", title: "大师级专属 MV", desc: "老师动用专业录音设备，在学校排练厅用九尺雅马哈三角钢琴，为你专业录制一首专属演奏视频（每学期仅限一次）。朋友圈炫技必备，永久留存！", theme: "theme-diamond", mark: "𝅗𝅥", prefix: "D-300A", stubText: "终极特权", cap: "钻石 · 大师级专属 MV" },
      { tier: "DIAMOND / 钻石", coins: "350 音符币", title: "额外专业课", desc: "超级大奖！凭此券和自己的专业老师多上一节专业课，名师一对一加餐指导（每个月仅限一次，每学期最多两次）。", theme: "theme-diamond", mark: "𝅗𝅥", prefix: "D-350A", stubText: "终极特权", cap: "钻石 · 额外专业课" },
      { fullPage: true, coins: "本学期排行榜累计音符币最多", title: "「梅纽因之星」荣耀专题", prefix: "LEGEND-400", cap: "传奇荣誉 · 学期终极认定（非兑换券）" }
    ];

    function generateUniqueBarcode(globalIndex) {
      let html = '';
      let seed = globalIndex * 104729;
      const rand = () => {
        seed = (seed * 279470273) % 4294967291;
        return seed / 4294967291;
      };
      const totalStripes = 60;
      for (let j = 0; j < totalStripes; j++) {
        const randomVal = rand();
        const h = randomVal > 0.85 ? 3 : (randomVal > 0.4 ? 2 : 1);
        if (j % 2 === 0) {
          html += `<i style="height:${h}px; width:100%; background-color: var(--bc-color); display:block; flex-shrink:0;"></i>`;
        } else {
          html += `<i style="height:${h}px; width:100%; display:block; flex-shrink:0;"></i>`;
        }
      }
      return html;
    }

    function ticketHtml(t, globalIndex, stubSuffix) {
      return `
        <div class="ticket ${t.theme} showcase-ticket">
          <div class="watermark">${t.mark}</div>
          <div class="ticket-main">
            <div class="t-header">
              <span class="t-tier">${t.tier}</span>
              <span class="t-coins">${t.coins}</span>
            </div>
            <h2 class="t-title">${t.title}</h2>
            <div class="official-seal">VALID<br>YMSQ</div>
            <div class="t-footer">
              <span>授权人: 青岛耶胡迪梅纽因学校教务部</span>
              <span>核销签字: <span class="t-sign"></span></span>
            </div>
            <div class="micro-text">YMSQ-AUTHORIZED-TICKET-YMSQ-AUTHORIZED-TICKET-YMSQ-AUTHORIZED-TICKET-YMSQ-AUTHORIZED</div>
          </div>
          <div class="ticket-stub">
            <div class="barcode">${generateUniqueBarcode(globalIndex)}</div>
            <div class="stub-text">${t.stubText}</div>
            <div class="stub-no">No. ${t.prefix}-${stubSuffix}</div>
          </div>
        </div>`;
    }

    function certHtmlVisual(t) {
      return `
        <div class="cert-page cert-page--visual">
          <div class="cert-border-outer"></div>
          <div class="cert-border-inner"></div>
          <div class="cert-corner tl"></div>
          <div class="cert-corner tr"></div>
          <div class="cert-corner bl"></div>
          <div class="cert-corner br"></div>
          <div class="cert-watermark">✦</div>
          <div class="cert-stars top">✦ &nbsp; ✦ &nbsp; ✦ &nbsp; ✦ &nbsp; ✦</div>
          <div class="cert-body">
            <span class="cert-badge">🌟</span>
            <div class="cert-label">YMSQ LEGEND AWARD</div>
            <div class="cert-school">青岛耶胡迪梅纽因学校 · 教务部荣誉出品</div>
            <div class="cert-divider"></div>
            <div class="cert-title">${t.title}</div>
            <div class="cert-subtitle">学期终极荣誉 · 学校自动颁发</div>
            <div class="cert-divider2"></div>
            <div class="cert-visual-fill" aria-hidden="true">✦ &nbsp; ✦ &nbsp; ✦</div>
          </div>
          <div class="cert-footer">
            <div class="cert-seal">VALID<br>YMSQ<br>认证</div>
            <div class="cert-sign-block">
              <div class="cert-sign-line"></div>
              <div class="cert-sign-label">授权人签字</div>
            </div>
            <div class="cert-sign-block">
              <div class="cert-sign-line"></div>
              <div class="cert-sign-label">持有人签字</div>
            </div>
          </div>
          <div class="cert-no">No. ${t.prefix} &nbsp;|&nbsp; 核销后作废</div>
          <div class="cert-stars bot">✦ &nbsp; ✦ &nbsp; ✦ &nbsp; ✦ &nbsp; ✦</div>
        </div>`;
    }

    function legendAwardCopyHtml() {
      return `
        <p class="vch-legend-lead">
          <span class="vch-legend-lead-inner">
            本荣誉由学校教务部授予<br />
            <strong>学期练琴表现最优秀</strong><br />
            学生。<br />
            <br />
            获奖同学将以<br />
            <strong>优秀学生代表</strong><br />
            身份，由专业团队录制<br />
            <strong>独家官方专题报道</strong><br />
            ，记录练琴故事与成长历程，并作为学校典范进行宣传。
          </span>
        </p>
        <p class="vch-legend-highlight">✦ &nbsp; 全校唯一 · 学期末由学校审核颁发给本学期最努力的练琴者 &nbsp; ✦</p>
        <p class="vch-legend-fine">本学期排行榜音符币累计第一名即具备获奖资格</p>`;
    }

    const root = document.getElementById('showcase-root');
    let globalCounter = 1;
    ticketData.forEach((t) => {
      const block = document.createElement('section');
      block.className = 'voucher-block';
      if (t.fullPage) {
        block.innerHTML = `
          <div class="vch-wrap vch-wrap--legend">
            <div class="block-cap">
              <strong>${t.cap}</strong>
              <span>${t.coins}</span>
            </div>
            <div class="vch-legend-grid">
              <div class="vch-legend-cert-col">
                <div class="cert-plate vch-cert-plate-legend">
                  <div class="vch-cert-scale-box">${certHtmlVisual(t)}</div>
                </div>
              </div>
              <div class="vch-legend-text-col">
                <div class="vch-legend-copy">${legendAwardCopyHtml()}</div>
              </div>
            </div>
          </div>`;
      } else {
        block.innerHTML = `
          <div class="vch-wrap vch-wrap--voucher">
            <div class="block-cap voucher-block-cap-center">
              <strong>${t.cap}</strong>
            </div>
            <div class="vch-voucher-split">
              <div class="vch-ticket-wrap">
                <div class="ticket-plate vch-ticket-compact">
                  ${ticketHtml(t, globalCounter, '01')}
                </div>
              </div>
              <div class="vch-coins-gap">
                <span class="vch-coins-label">所需音符币</span>
                <span class="vch-coins-value">${t.coins}</span>
              </div>
              <div class="vch-desc-panel">
                <p class="vch-desc-main">${t.desc}</p>
              </div>
            </div>
          </div>`;
        globalCounter++;
      }
      root.appendChild(block);
    });
  </script>
</body>
</html>
