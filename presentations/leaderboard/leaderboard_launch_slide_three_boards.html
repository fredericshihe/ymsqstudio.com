<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>专项榜 · 稳定 · 守则 · 进步</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: #000;
      color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .stage {
      position: relative;
      min-height: 100%;
      padding: clamp(20px, 4vmin, 40px) clamp(14px, 3vmin, 32px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(
          circle at 50% 50%,
          #000 0%,
          #000 27%,
          rgba(99, 102, 241, 0.17) 36%,
          rgba(129, 140, 248, 0.12) 43%,
          rgba(236, 72, 153, 0.07) 50%,
          rgba(0, 0, 0, 0.72) 62%,
          #000 80%
        ),
        #000;
    }
    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.55;
      pointer-events: none;
    }
    .glow-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(100vmin, 880px);
      height: min(100vmin, 880px);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: #000;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 28px rgba(99, 102, 241, 0.2), 0 0 72px rgba(99, 102, 241, 0.09);
      pointer-events: none;
      z-index: 0;
    }
    .inner {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1500px;
    }
    header {
      text-align: center;
      margin-bottom: clamp(1rem, 3vmin, 1.75rem);
    }
    .dim-h1 {
      font-size: clamp(1.5rem, 5vmin, 2.75rem);
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -0.03em;
      margin-bottom: clamp(0.5rem, 1.5vmin, 1rem);
    }
    .dim-h1-a { color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.45), 0 8px 48px rgba(99, 102, 241, 0.35); }
    .dim-h1-sep { color: rgba(255,255,255,0.4); font-weight: 700; padding: 0 0.12em; }
    .dim-h1-b {
      background: linear-gradient(125deg, #93c5fd 0%, #a5b4fc 35%, #c4b5fd 70%, #e9d5ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .dim-sub {
      font-size: clamp(0.85rem, 2vmin, 1.1rem);
      font-weight: 500;
      letter-spacing: 0.06em;
      color: rgba(226, 232, 240, 0.78);
      max-width: 36em;
      margin: 0 auto;
      line-height: 1.55;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(0.65rem, 2vmin, 1.25rem);
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
    .card {
      position: relative;
      border-radius: clamp(12px, 1.5vmin, 20px);
      padding: clamp(12px, 2vmin, 18px) clamp(10px, 1.5vmin, 14px);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: clamp(8px, 1.2vmin, 12px);
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(145deg, var(--accent), transparent 60%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.5;
    }
    .tri-stable { --accent: #a855f7; }
    .tri-rules { --accent: #f59e0b; }
    .tri-progress { --accent: #10b981; }
    .badge {
      width: clamp(2.75rem, 8vmin, 3.75rem);
      height: clamp(2.75rem, 8vmin, 3.75rem);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.35rem, 4vmin, 2rem);
      background: var(--accent);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    }
    .name {
      font-size: clamp(0.95rem, 2.2vmin, 1.15rem);
      font-weight: 700;
      line-height: 1.35;
    }
    .name span {
      display: block;
      font-size: 0.85em;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.52);
      margin-top: 0.25em;
    }
    .line p {
      font-size: clamp(0.78rem, 1.75vmin, 0.95rem);
      line-height: 1.55;
      color: rgba(245, 245, 247, 0.9);
      font-weight: 600;
      text-align: left;
    }
    footer {
      text-align: center;
      margin-top: clamp(1.25rem, 3vmin, 2rem);
      font-size: clamp(0.72rem, 1.6vmin, 0.85rem);
      color: rgba(245, 245, 247, 0.42);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="glow-ring" aria-hidden="true"></div>
    <div class="inner">
      <header>
        <h1 class="dim-h1"><span class="dim-h1-a">专项榜</span><span class="dim-h1-sep">·</span><span class="dim-h1-b">稳定 · 守则 · 进步</span></h1>
        <p class="dim-sub">综合榜看总分；下面三张榜各比一件事，一句话就能懂</p>
      </header>
      <div class="grid">
        <article class="card tri-stable">
          <div class="badge" aria-hidden="true">🎯</div>
          <h2 class="name">稳定榜<span>练得稳</span></h2>
          <div class="line"><p>比谁练琴<strong>习惯更稳</strong>：越规律、越不忽高忽低，名次越靠前。</p></div>
        </article>
        <article class="card tri-rules">
          <div class="badge" aria-hidden="true">🏅</div>
          <h2 class="name">守则榜<span>守规矩</span></h2>
          <div class="line"><p>比谁练琴<strong>最守规矩</strong>：不规范、异常的记录越少，名次越靠前。</p></div>
        </article>
        <article class="card tri-progress">
          <div class="badge" aria-hidden="true">📈</div>
          <h2 class="name">进步榜<span>进步大</span></h2>
          <div class="line"><p>比谁这周<strong>总分涨得多</strong>：涨得多就靠前，不看「百分比虚高」。</p></div>
        </article>
      </div>
      <footer>仅工作日统计 · 青岛耶胡迪梅纽因学校</footer>
    </div>
  </div>
</body>
</html>
